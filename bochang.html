<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
  <title>Đóng Hàng - Cô Mập Fashion</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="app.css">
  <style>
    /* Page specific overrides for Packing */
    body.packing-page {
      --sidebar-width: 14%;
      --search-form-width: min(100%, 640px);
      --search-form-offset: 2.4rem;
      --shell-pad-x: clamp(3rem, 5vw, 4rem);
      --shell-pad-y: clamp(2.25rem, 3vw, 3rem);
      background: #F5F5F7;
      color: #1D1D1F;
    }

    .packing-page main {
      max-width: 1320px;
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    #scan-form-container {
      width: var(--search-form-width);
      margin-left: 0;
      margin-right: 0;
      margin-top: var(--search-form-offset);
      margin-bottom: 0;
      justify-self: start;
      align-self: start;
    }

    .packing-page #scan-form {
      width: 100%;
      display: grid;
      grid-template-columns: auto minmax(0, 1fr);
      align-items: center;
      gap: 1rem;
      padding: 0 0 0.75rem;
      border-bottom: 1px solid #D2D2D7;
    }

    .packing-page #scan-form:focus-within {
      border-bottom-color: #1D1D1F;
    }

    .packing-page #scan-input {
      width: 100%;
      border: none;
      padding: 0;
      background: transparent;
      font-family: "Inter", sans-serif;
      font-size: clamp(1.15rem, 1.8vw, 1.55rem);
      font-weight: 400;
      line-height: 1.2;
      text-align: left;
      color: #1D1D1F;
      outline: none;
    }

    .packing-page #scan-input::placeholder {
      font-family: "Inter", sans-serif;
      font-size: inherit;
      line-height: inherit;
      color: #6E6E73;
      font-weight: 400;
    }

    .packing-page #scan-form button[type="submit"] {
      width: 2.25rem;
      height: 2.25rem;
      min-width: 0;
      padding: 0;
      border: none;
      border-radius: 999px;
      background: transparent;
      color: #1D1D1F;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      box-shadow: none;
      transform: none;
    }

    .packing-page #scan-form button[type="submit"] svg {
      width: 1.35rem;
      height: 1.35rem;
      stroke: currentColor;
      stroke-width: 2;
      fill: none;
    }

    .packing-status {
      text-align: center;
      margin-bottom: 2rem;
    }

    .packing-code {
      font-size: 3.5rem;
      font-weight: 300;
      line-height: 1;
    }

    .packing-progress {
      font-size: 1.5rem;
      color: #888;
      font-weight: 300;
    }

    .line-item {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      padding: 1rem;
      border-bottom: 1px solid #f2f2f2;
    }

    .line-item.completed {
      background: #f9fffb;
    }

    .line-sku {
      font-size: 0.9rem;
      text-transform: uppercase;
      color: #888;
      letter-spacing: 0.05em;
    }

    .line-size {
      font-size: 1.2rem;
      font-weight: 500;
    }

    .line-qty {
      font-size: 1.5rem;
      font-weight: 300;
    }

    /* Desktop split specific */
    @media (min-width: 900px) {
      .packing-page main {
        width: calc(100% - var(--sidebar-width));
        max-width: none;
        align-items: start;
      }

      .packing-page #scan-form-container {
        grid-column: 1 / 2;
        width: var(--search-form-width);
        max-width: none;
        margin-left: 0;
        margin-right: 0;
        margin-top: 0;
      }

      .packing-page .result-card {
        grid-column: 1 / -1;
        width: 100%;
        max-width: none;
        grid-template-columns: 1fr 1fr;
        gap: clamp(2rem, 4vw, 4rem);
        align-items: start;
        margin-top: 0.9rem;
      }

      .packing-page .location-panel {
        display: flex;
        align-items: flex-start;
        justify-content: flex-start;
        padding-top: 0.2rem;
      }

      .packing-page .location-panel-header {
        width: min(100%, 520px);
        align-items: flex-start;
        text-align: left;
      }

      .packing-page .location-label {
        margin: 0;
        font-size: 0.78rem;
        line-height: 1.2;
        letter-spacing: 0.08em;
      }

      .packing-page #result-container > article:last-child {
        width: 100% !important;
        display: flex;
        justify-content: flex-end;
      }

      .packing-page #list-container {
        width: min(100%, 540px);
        min-height: 400px;
        border-radius: 24px;
        padding: 0.95rem 1.25rem;
      }

      .packing-status {
        text-align: left;
      }
    }

    @media (max-width: 899px) {
      .packing-page #scan-form-container {
        margin-top: 0.8rem;
      }
    }
  </style>
</head>

<body class="packing-page">
  <main>
    <div class="topbar">
      <div class="sidebar-brand">
        <span class="sidebar-brand-mark">CM</span>
        <div class="sidebar-brand-text">
          <strong>Cô Mập</strong>
          <span>Fashion</span>
        </div>
        <span class="mobile-page-title">Đóng hàng</span>
        <button class="mobile-nav-toggle" type="button" aria-label="Mở menu" aria-expanded="false">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 7h16"></path><path d="M4 12h16"></path><path d="M4 17h16"></path></svg>
        </button>
      </div>
      <nav class="header-nav">
        <a href="location.html" class="header-link">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 21s-5.5-4.2-5.5-9.25A5.5 5.5 0 0 1 12 6.25a5.5 5.5 0 0 1 5.5 5.5C17.5 16.8 12 21 12 21Z"></path><circle cx="12" cy="11.75" r="2.25"></circle></svg>
          <span class="nav-text">Vị trí</span>
        </a>
        <a href="thongtindonhang.html" class="header-link">
          <svg viewBox="0 0 24 24" aria-hidden="true"><rect x="4" y="5" width="16" height="14" rx="2"></rect><path d="M8 9h8"></path><path d="M8 13h5"></path></svg>
          <span class="nav-text">Đơn hàng</span>
        </a>
        <a href="bochang.html" class="header-link active">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M5 8.5h10v10H5z"></path><path d="M15 11h2.5l1.5 2v5H15"></path><circle cx="8.5" cy="18.5" r="1.5"></circle><circle cx="16.5" cy="18.5" r="1.5"></circle></svg>
          <span class="nav-text">Đóng hàng</span>
        </a>
        <a href="hangbom.html" class="header-link">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M8 7h8"></path><path d="M9 7V5.5A1.5 1.5 0 0 1 10.5 4h3A1.5 1.5 0 0 1 15 5.5V7"></path><path d="M6 7h12l-1 12H7L6 7Z"></path></svg>
          <span class="nav-text">Hàng hoàn</span>
        </a>
        <a href="inmaqr.html" class="header-link">
          <svg viewBox="0 0 24 24" aria-hidden="true"><rect x="5" y="5" width="6" height="6"></rect><rect x="13" y="5" width="6" height="6"></rect><rect x="5" y="13" width="6" height="6"></rect><path d="M14 14h1"></path><path d="M18 14h1"></path><path d="M14 18h5"></path><path d="M18 15v3"></path></svg>
          <span class="nav-text">In Mã QR</span>
        </a>
        <a href="kiemkho.html" class="header-link">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M5 7h14"></path><path d="M7 7v10h10V7"></path><path d="M9.5 11.5h5"></path><path d="M9.5 14.5h3"></path></svg>
          <span class="nav-text">Kiểm Kho</span>
        </a>
      </nav>
      <div class="sidebar-meta">Cô Mập Fashion</div>
    </div>
    <button class="mobile-nav-backdrop" type="button" aria-label="Đóng menu"></button>

    <!-- Center Search/Scan Input -->
    <div class="lookup-form" id="scan-form-container">
      <form id="scan-form" autocomplete="off">
        <label class="sr-only" for="scan-input">Mã đơn hàng</label>
        <button type="submit" aria-label="Tra cứu đơn đóng hàng">
          <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <circle cx="11" cy="11" r="7"></circle>
            <path d="M20 20L16.65 16.65"></path>
          </svg>
        </button>
        <input id="scan-input" type="text" placeholder="Nhập mã đơn hàng hoặc quét..." autocomplete="off" autofocus />
      </form>
    </div>

    <div class="status-bar" id="status-bar" data-variant="idle" hidden></div>

    <!-- Main Content Split -->
    <section id="result-container" class="result-card" hidden>

      <!-- Left Side: Status / Big Code -->
      <article class="location-panel"> <!-- Reusing class for layout -->
        <div class="location-panel-header">
          <p class="location-label">Trạng thái</p>

          <!-- Idle State -->
          <div id="idle-view">
            <p class="location-text" style="font-size: 2rem; color: #ccc;">Sẵn sàng</p>
          </div>

          <!-- Loading State -->
          <div id="loading-view" hidden>
            <p class="location-text" style="font-size: 2rem;">Đang xử lý...</p>
          </div>

          <!-- Active Order State -->
          <div id="order-info-view" hidden>
            <p class="location-text" id="order-code-display">---</p>
            <p class="location-text" id="order-progress-display"
              style="font-size: 2rem; color: #888; margin-top: 0.5rem;">0/0</p>
          </div>

          <!-- Complete State -->
          <div id="complete-view" hidden>
            <p class="location-text" style="color: #10b981;">Hoàn thành</p>
            <button id="reset-btn" class="primary-btn" style="margin-top: 2rem;">Đơn tiếp theo</button>
          </div>
        </div>
      </article>

      <!-- Right Side: List -->
      <article style="width: 100%;">
        <div class="product-visual" id="list-container"
          style="background: white; border: 1px solid #f2f2f2; height: auto; min-height: 400px; aspect-ratio: auto;">
          <!-- Lines injected here -->
          <div class="placeholder" id="list-placeholder" style="font-size: 1rem; color: #eee;">Danh sách trống</div>
          <div id="lines-list"></div>
        </div>
      </article>

    </section>

    <footer>&copy; <span id="year"></span> Kho vận hành.</footer>
  </main>

  <script>
    // Original logic adapted
    const ORDER_WEBHOOK_URL = 'https://n8n-hongnhung198198-u40833.vm.elestio.app/webhook/hook/order/resolve';
    const PICK_WEBHOOK_URL = 'https://n8n-hongnhung198198-u40833.vm.elestio.app/webhook/hook/pick/verify';
    const RESET_WEBHOOK_URL = 'https://n8n-hongnhung198198-u40833.vm.elestio.app/webhook/reset_bochang';
    const LAST_PAGE_KEY = 'cmf:lastPage';

    const scanInput = document.getElementById('scan-input');
    const scanForm = document.getElementById('scan-form');
    const statusBar = document.getElementById('status-bar');

    const idleView = document.getElementById('idle-view');
    const loadingView = document.getElementById('loading-view');
    const orderInfoView = document.getElementById('order-info-view');
    const completeView = document.getElementById('complete-view');

    const orderCodeDisplay = document.getElementById('order-code-display');
    const progressDisplay = document.getElementById('order-progress-display');
    const linesList = document.getElementById('lines-list');
    const listPlaceholder = document.getElementById('list-placeholder');
    const resetBtn = document.getElementById('reset-btn');
    const resultContainer = document.getElementById('result-container');

    let appState = 'IDLE';
    let currentOrder = null;
    let audioContext = null;
    let completeResetTimer = null;

    document.getElementById('year').textContent = new Date().getFullYear();
    localStorage.setItem(LAST_PAGE_KEY, 'bochang.html');

    // Audio
    function playSound(type) {
      if (!audioContext) audioContext = new (window.AudioContext || window.webkitAudioContext)();
      if (audioContext.state === 'suspended') audioContext.resume();

      const osc = audioContext.createOscillator();
      const g = audioContext.createGain();
      osc.connect(g); g.connect(audioContext.destination);

      if (type === 'error') {
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(150, audioContext.currentTime);
      } else {
        osc.frequency.setValueAtTime(type === 'scan' ? 800 : 1200, audioContext.currentTime);
      }
      g.gain.setValueAtTime(0.1, audioContext.currentTime);
      g.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.15);
      osc.start();
      osc.stop(audioContext.currentTime + 0.15);
    }
    document.body.addEventListener('click', () => { if (!audioContext) playSound('scan'); });

    // View Management
    function setView(state) {
      appState = state;
      if (state !== 'COMPLETE' && completeResetTimer) {
        clearTimeout(completeResetTimer);
        completeResetTimer = null;
      }
      idleView.hidden = true;
      loadingView.hidden = true;
      orderInfoView.hidden = true;
      completeView.hidden = true;
      resultContainer.hidden = state === 'IDLE';

      if (state === 'IDLE') idleView.hidden = false;
      if (state === 'LOADING') loadingView.hidden = false;
      if (state === 'ORDER') orderInfoView.hidden = false;
      if (state === 'COMPLETE') completeView.hidden = false;

      scanInput.focus();
    }

    function resetCurrentOrder() {
      if (currentOrder) {
        fetch(RESET_WEBHOOK_URL, {
          method: 'POST', body: JSON.stringify({ order_code: currentOrder.code }), headers: { 'Content-Type': 'application/json' }
        }).catch(console.error);
      }
      currentOrder = null;
      linesList.innerHTML = '';
      listPlaceholder.hidden = false;
      setView('IDLE');
    }

    function scheduleNextOrderReset() {
      if (completeResetTimer) clearTimeout(completeResetTimer);
      completeResetTimer = setTimeout(() => {
        completeResetTimer = null;
        resetCurrentOrder();
        updateStatus('Sẵn sàng quét đơn tiếp theo', 'success');
      }, 1200);
    }

    function updateStatus(msg, type = 'idle') {
      if (!msg) { statusBar.hidden = true; return; }
      statusBar.textContent = msg;
      statusBar.dataset.variant = type;
      statusBar.hidden = false;
      setTimeout(() => statusBar.hidden = true, 3000);
    }

    // Order Logic
    async function handleScan(code) {
      code = code.trim();
      if (!code) return;

      if (appState === 'IDLE' || appState === 'ERROR') {
        // Resolve Order
        setView('LOADING');
        try {
          const res = await fetch(ORDER_WEBHOOK_URL, {
            method: 'POST', body: JSON.stringify({ order_code: code }), headers: { 'Content-Type': 'application/json' }
          });
          const data = Array.isArray(await res.json()) ? (await res.json())[0] : (await res.json());

          if (!data || (!data.ok && !data.order_code)) throw new Error('Không tìm thấy đơn ' + code);

          currentOrder = {
            code: data.order_code,
            lines: (data.lines || []).map(l => ({ ...l, picked: 0, qty: Number(l.qty) || 1 }))
          };

          renderOrder();
          setView('ORDER');
          playSound('success');

        } catch (e) {
          updateStatus(e.message, 'error');
          playSound('error');
          setView('IDLE');
        }
      } else if (appState === 'ORDER') {
        // Pick Product
        updateStatus('Đang xác thực...', 'loading');
        try {
          // Mocking the pick call for UI speed, in reality wait for fetch
          const sku = code.split('-')[0].toUpperCase();
          const line = currentOrder.lines.find(l => l.sku === sku && l.picked < l.qty);

          if (!line) throw new Error('Sản phẩm không khớp hoặc đã đủ');

          line.picked++;
          renderOrder();
          playSound('scan');
          updateStatus(`Đã pick ${sku}`, 'success');

          // Check complete
          if (currentOrder.lines.every(l => l.picked >= l.qty)) {
            setView('COMPLETE');
            playSound('success');
            scheduleNextOrderReset();
          }

          // In background send to server
          fetch(PICK_WEBHOOK_URL, {
            method: 'POST', body: JSON.stringify({ order_code: currentOrder.code, product_code: code }), headers: { 'Content-Type': 'application/json' }
          }).catch(console.error);

        } catch (e) {
          updateStatus(e.message, 'error');
          playSound('error');
        }
      }
    }

    function renderOrder() {
      orderCodeDisplay.textContent = currentOrder.code;

      let total = 0, picked = 0;
      linesList.innerHTML = '';

      currentOrder.lines.forEach(line => {
        total += line.qty;
        picked += line.picked;

        const div = document.createElement('div');
        div.className = `line-item ${line.picked >= line.qty ? 'completed' : ''}`;
        div.innerHTML = `
                  <div>
                      <div class="line-sku">${line.sku}</div>
                      <div class="line-size">${line.size || ''}</div>
                  </div>
                  <div class="line-qty">${line.picked}/${line.qty}</div>
              `;
        linesList.appendChild(div);
      });

      progressDisplay.textContent = `${picked}/${total}`;
      listPlaceholder.hidden = true;
    }

    resetBtn.addEventListener('click', () => {
      resetCurrentOrder();
    });

    scanForm.addEventListener('submit', (e) => {
      e.preventDefault();
      handleScan(scanInput.value);
      scanInput.value = '';
    });

    // Init
    setView('IDLE');
  </script>
  <script>
    (() => {
      const topbar = document.querySelector('.topbar');
      const toggle = document.querySelector('.mobile-nav-toggle');
      const nav = document.querySelector('.header-nav');
      const backdrop = document.querySelector('.mobile-nav-backdrop');
      if (!topbar || !toggle || !nav || !backdrop) return;
      const closeMenu = () => {
        topbar.classList.remove('nav-open');
        document.body.classList.remove('mobile-nav-open');
        toggle.setAttribute('aria-expanded', 'false');
      };
      const openMenu = () => {
        topbar.classList.add('nav-open');
        document.body.classList.add('mobile-nav-open');
        toggle.setAttribute('aria-expanded', 'true');
      };
      toggle.addEventListener('click', () => {
        if (topbar.classList.contains('nav-open')) closeMenu();
        else openMenu();
      });
      backdrop.addEventListener('click', closeMenu);
      nav.addEventListener('click', (event) => {
        if (event.target.closest('a')) closeMenu();
      });
      window.addEventListener('resize', () => {
        if (window.innerWidth > 899) closeMenu();
      });
      document.addEventListener('keydown', (event) => {
        if (event.key === 'Escape') closeMenu();
      });
    })();
  </script>
</body>

</html>
