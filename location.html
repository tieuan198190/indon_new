<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cô Mập Fashion</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Manrope:wght@400;500;700;800&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="app.css">
  <style>
    /* Specific styles for Location Page to match reference UI */
    body.location-page {
      --sidebar-width: 14%;
      --search-form-width: min(100%, 640px);
      --search-form-offset: 2.4rem;
      --shell-pad-x: clamp(3rem, 5vw, 4rem);
      --shell-pad-y: clamp(2.25rem, 3vw, 3rem);
      background: #F5F5F7;
      color: #1D1D1F;
    }

    .location-page main {
      max-width: 1320px;
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    .location-page .lookup-form {
      width: var(--search-form-width);
      margin-left: 0;
      margin-right: 0;
      margin-top: var(--search-form-offset);
      margin-bottom: 0;
      justify-self: start;
      align-self: start;
    }

    .location-page #lookup-form {
      width: 100%;
      display: grid;
      grid-template-columns: auto minmax(0, 1fr);
      align-items: center;
      gap: 1rem;
      padding: 0 0 0.75rem;
      border-bottom: 1px solid #D2D2D7;
    }

    .location-page #lookup-form:focus-within {
      border-bottom-color: #1D1D1F;
    }

    .location-page .search-label {
      display: none;
    }

    .location-page input[type="text"] {
      border: none;
      padding: 0;
      background: transparent;
      font-family: "Inter", sans-serif;
      font-size: clamp(1.15rem, 1.8vw, 1.55rem);
      font-weight: 400;
      line-height: 1.2;
      text-align: left;
      color: #1D1D1F;
    }

    .location-page input[type="text"]::placeholder {
      font-family: "Inter", sans-serif;
      font-size: inherit;
      line-height: inherit;
      color: #6E6E73;
      font-weight: 400;
    }

    .location-page input[type="text"]:focus {
      border-bottom: none;
    }

    .location-page button[type="submit"] {
      width: 2.25rem;
      height: 2.25rem;
      padding: 0;
      min-width: 0;
      border-radius: 999px;
      background: transparent;
      color: #1D1D1F;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transform: none;
      box-shadow: none;
    }

    .location-page button[type="submit"]:hover,
    .location-page button[type="submit"]:active {
      transform: none;
      color: #1D1D1F;
      background: transparent;
    }

    .location-page button[type="submit"] svg {
      width: 1.35rem;
      height: 1.35rem;
      stroke: currentColor;
      stroke-width: 2;
      fill: none;
    }

    .location-page button[type="submit"].loading {
      opacity: 0.45;
      cursor: wait;
    }

    .location-page .mobile-inline-submit {
      display: none;
    }

    .location-page .result-card {
      margin-top: clamp(2.5rem, 8vh, 5rem);
      align-items: center;
    }

    .location-page .location-panel {
      padding: 0;
      text-align: center;
    }

    .location-page .location-panel-header {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
      margin-bottom: 0;
    }

    .location-page .location-skeleton {
      width: min(360px, 78vw);
      height: clamp(4rem, 10vw, 6rem);
      border-radius: 18px;
      background: linear-gradient(90deg, #D2D2D7 25%, #F5F5F7 50%, #D2D2D7 75%);
      background-size: 200% 100%;
      animation: shimmerPulse 1.35s infinite linear;
    }

    .location-page .location-text {
      font-family: "Manrope", sans-serif;
      font-size: clamp(4.25rem, 13vw, 8.5rem);
      font-weight: 800;
      letter-spacing: -0.06em;
      line-height: 0.95;
      color: #1D1D1F;
      text-transform: uppercase;
      margin: 0;
      max-width: 5.5ch;
      text-wrap: balance;
    }

    .location-page .ghost-btn {
      margin-top: 0.35rem;
      border: none;
      padding: 0;
      background: transparent;
      color: #6E6E73;
      font-size: 1rem;
      display: inline-flex;
      align-items: center;
      gap: 0.55rem;
    }

    .location-page .ghost-btn svg {
      width: 18px;
      height: 18px;
      fill: currentColor;
      flex-shrink: 0;
    }

    .location-page .ghost-btn:hover {
      border-color: transparent;
      color: #1D1D1F;
    }

    .location-page .location-editor {
      width: min(100%, 460px);
      margin: 0 auto;
      gap: 1rem;
    }

    .location-page .location-editor textarea {
      min-height: 132px;
      border: 1px solid #D2D2D7;
      border-radius: 24px;
      background: #FFFFFF;
      padding: 1.15rem 1.25rem;
      font-size: 1.05rem;
      box-shadow: none;
    }

    .location-page .neutral-btn,
    .location-page .primary-btn {
      border-radius: 999px;
      padding: 0.9rem 1.5rem;
      text-decoration: none;
    }

    .location-page .neutral-btn {
      background: #FFFFFF;
      color: #1D1D1F;
      border: 1px solid #D2D2D7;
    }

    .location-page .primary-btn {
      background: #1D1D1F;
    }

    .location-page .product-card {
      width: min(100%, 680px);
    }

    .location-page .product-visual-shell {
      position: relative;
      width: min(100%, clamp(320px, 30vw, 520px));
      margin: 0 auto;
    }

    .location-page .product-visual {
      width: 100%;
      aspect-ratio: 3 / 4;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
      overflow: visible;
      background: none;
      border-radius: 0;
      box-shadow: none;
      border: none;
    }

    .location-page .product-visual img {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center top;
      background: transparent;
      border-radius: 40px;
      image-rendering: auto;
      filter: contrast(1.03) saturate(1.02);
      transform: translateZ(0);
    }

    .map-chip {
      position: absolute;
      right: -2.8rem;
      bottom: 3rem;
      width: 68px;
      height: 68px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px solid #D2D2D7;
      border-radius: 16px;
      background: #FFFFFF;
      box-shadow: none;
      color: #1D1D1F;
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      cursor: pointer;
      transition: transform 0.2s ease;
    }

    .map-chip:hover {
      transform: translateY(-2px);
    }

    .map-chip svg {
      width: 26px;
      height: 26px;
      fill: currentColor;
    }

    .location-page footer {
      display: none;
    }

    @media (min-width: 900px) {
      body.location-page {
        overflow: hidden;
      }

      .location-page main {
        width: calc(100% - var(--sidebar-width));
        max-width: none;
        grid-template-columns: 1fr 1fr;
        grid-template-rows: auto auto 1fr auto;
        column-gap: clamp(3rem, 7vw, 9rem);
        row-gap: 2rem;
        padding: var(--shell-pad-y) var(--shell-pad-x) 1rem;
        max-height: none;
        align-items: start;
      }

      .location-page .lookup-form {
        grid-column: 1 / 2;
        width: min(100%, 520px);
        margin: 0;
      }

      .location-page .result-card {
        grid-column: 1 / -1;
        grid-template-columns: 1fr 1fr;
        gap: clamp(3rem, 7vw, 8rem);
        height: min(68vh, 760px);
        margin-top: 1rem;
        align-items: center;
      }

      .location-page .location-panel {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100%;
        text-align: center;
      }

      .location-page .location-panel-header {
        gap: 1.2rem;
      }

      .location-page .location-text {
        font-size: clamp(5.8rem, 9vw, 8.8rem);
        line-height: 0.88;
        max-width: 4.8ch;
      }

      .location-page .ghost-btn {
        margin-top: 0.4rem;
      }

      .location-page .product-card {
        justify-content: flex-end;
        align-items: center;
        min-height: 100%;
        max-height: none;
      }

      .location-page .product-visual-shell {
        width: min(100%, clamp(430px, 34vw, 620px));
        margin-left: auto;
      }

      .location-page .product-visual img {
        border-radius: 48px;
      }

      .map-chip {
        right: -3.25rem;
        bottom: 4.5rem;
        width: 72px;
        height: 72px;
      }

      .location-page footer {
        grid-column: 1 / -1;
        display: block;
      }
    }

    @media (max-width: 899px) {
      .location-page .topbar {
        position: static;
        padding: 0.75rem 1rem;
        justify-content: flex-start;
      }

      .location-page .lookup-form {
        margin-top: 0.8rem;
      }

      .location-page #lookup-form {
        grid-template-columns: minmax(0, 1fr) auto;
        gap: 0.75rem;
        align-items: end;
      }

      .location-page #lookup-button {
        display: none;
      }

      .location-page .mobile-inline-submit {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-width: 72px;
        height: 42px;
        padding: 0 1rem;
        border: none;
        border-radius: 999px;
        background: #1D1D1F;
        color: #FFFFFF;
        font-size: 0.85rem;
        font-weight: 600;
        line-height: 1;
      }

      .location-page input[type="text"] {
        min-height: 42px;
      }

      .location-page .result-card {
        display: flex;
        flex-direction: column;
        gap: 2rem;
        margin-top: 2rem;
      }

      .location-page .location-panel {
        position: static;
        width: 100%;
        background: transparent;
        box-shadow: none;
        border: none;
      }

      .location-page .location-text {
        font-size: clamp(3.4rem, 19vw, 5.6rem);
      }

      .location-page .ghost-btn {
        font-size: 0.95rem;
      }

      .location-page .location-editor {
        width: 100%;
      }

      .location-page .product-card,
      .location-page .product-visual-shell {
        width: 100%;
      }

      .location-page .product-visual {
        border-radius: 0;
      }

      .location-page .product-visual img {
        border-radius: 28px;
      }

      .map-chip {
        right: 1rem;
        bottom: 1rem;
        width: 56px;
        height: 56px;
      }

      .location-page footer {
        padding-top: 1rem;
        font-size: 0.72rem;
        letter-spacing: 0.14em;
      }
    }
  </style>
</head>

  <script>
    const API_URL =
      "https://n8n-hongnhung198198-u40833.vm.elestio.app/webhook/location_sanpham";
    const UPDATE_LOCATION_URL =
      "https://n8n-hongnhung198198-u40833.vm.elestio.app/webhook/nhaplai-location";
    const REQUEST_TIMEOUT = 12000;
    const STATUS_AUTO_HIDE = 2600;
    const LAST_PAGE_KEY = 'cmf:lastPage';

    const form = document.getElementById("lookup-form");
    const input = document.getElementById("sku-input");
    const button = document.getElementById("lookup-button");
    const statusBar = document.getElementById("status-bar");
    const topProgress = document.getElementById("top-progress");
    const resultSection = document.getElementById("result-section");
    const locationPanel = document.getElementById("location-panel");
    const locationSkeleton = document.getElementById("location-skeleton");
    const productLocationEl = document.getElementById("product-location");
    const productVisualEl = document.getElementById("product-visual");
    const productCard = document.querySelector(".product-card");
    const editLocationBtn = document.getElementById("edit-location");
    const quickEditBtn = document.getElementById("quick-edit-location");
    const locationEditor = document.getElementById("location-editor");
    const locationInput = document.getElementById("location-input");
    const saveLocationBtn = document.getElementById("save-location");
    const cancelLocationBtn = document.getElementById("cancel-location");
    const mainEl = document.querySelector("main");

    let currentSku = "";
    let currentLocation = "";
    let locationSaving = false;
    let statusHideTimer = null;
    const prefersReducedMotion = window.matchMedia(
      "(prefers-reduced-motion: reduce)"
    ).matches;
    localStorage.setItem(LAST_PAGE_KEY, 'location.html');

    function setWelcomeState(isWelcome) {
      // Optional: adjust layout if needed
    }

    function animateStagger(elements, baseDelayMs = 0, stepMs = 80) {
      if (prefersReducedMotion) return;
      elements
        .filter(Boolean)
        .forEach((element, index) => animateReveal(element, baseDelayMs + stepMs * index));
    }

    function animateReveal(element, delayMs = 0) {
      if (!element || prefersReducedMotion) return;
      try {
        element.animate(
          [
            { opacity: 0, transform: "translateY(12px)" },
            { opacity: 1, transform: "translateY(0)" },
          ],
          {
            duration: 520,
            easing: "cubic-bezier(0.16, 1, 0.3, 1)",
            fill: "both",
            delay: delayMs,
          }
        );
      } catch { }
    }

    function setSkeletonState(isSkeleton) {
      locationSkeleton.hidden = !isSkeleton;
      productLocationEl.hidden = isSkeleton;
      locationPanel.hidden = false;
      resultSection.hidden = false;
      editLocationBtn.hidden = true;
      quickEditBtn.hidden = true;
      locationEditor.hidden = true;

      if (isSkeleton) {
        productCard.hidden = false;
        productVisualEl.innerHTML = '<div class="placeholder">LOADING</div>';
        animateStagger([locationPanel, productCard], 0, 90);
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      lookupProduct();
    });

    input.addEventListener("input", () => {
      const { selectionStart, selectionEnd } = input;
      input.value = input.value.toUpperCase();
      input.setSelectionRange(selectionStart, selectionEnd);
    });

    editLocationBtn.addEventListener("click", () => {
      if (!locationSaving) enterLocationEdit();
    });

    quickEditBtn.addEventListener("click", () => {
      if (!locationSaving) enterLocationEdit();
    });

    cancelLocationBtn.addEventListener("click", () => {
      if (!locationSaving) cancelLocationEdit();
    });

    saveLocationBtn.addEventListener("click", () => {
      if (!locationSaving) submitLocationUpdate();
    });

    async function lookupProduct() {
      const sku = input.value.trim().toUpperCase();
      if (!sku) {
        updateStatus("Vui lòng nhập mã sản phẩm.", "error");
        return;
      }

      input.blur();
      input.value = "";
      clearCurrentProduct();

      setSkeletonState(true);
      setLoadingState(true);
      statusBar.hidden = true;

      try {
        const product = await fetchProduct(sku);
        if (!product) {
          setSkeletonState(false);
          resultSection.hidden = true;
          updateStatus("Không tìm thấy dữ liệu cho mã " + sku, "empty");
          return;
        }
        renderProduct(sku, product);
        updateStatus("", "idle");
      } catch (error) {
        console.error(error);
        setSkeletonState(false);
        resultSection.hidden = true;
        const message = error.message || "Không thể lấy dữ liệu. Thử lại sau.";
        updateStatus(message, "error");
      } finally {
        setLoadingState(false);
      }
    }

    async function fetchProduct(sku) {
      const controller = new AbortController();
      const timeout = setTimeout(() => controller.abort(), REQUEST_TIMEOUT);

      const response = await fetch(API_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ sku }),
        signal: controller.signal,
      }).catch((error) => {
        if (error.name === "AbortError") throw error;
        throw new Error("Không thể kết nối webhook.");
      });

      clearTimeout(timeout);

      if (!response.ok) {
        throw new Error("Lỗi kết nối máy chủ");
      }

      let payload;
      try {
        payload = await response.json();
      } catch (error) {
        throw new Error("Dữ liệu không hợp lệ");
      }

      const blocks = normalizePayload(payload);
      if (!blocks.length) return null;

      const info = blocks.find((item) => "price" in item || "imageUrl" in item) ?? blocks[0];
      const locationEntry = blocks.find((item) => "Location" in item || "location" in item) ?? {};

      return {
        found: info?.found ?? true,
        imageUrl: info?.imageUrl || "",
        location: locationEntry.Location || locationEntry.location || "",
      };
    }

    function normalizePayload(payload) {
      const wrap = (value) => (Array.isArray(value) ? value : [value]);
      const flatten = (value) => value.flatMap((item) => {
        if (item && Array.isArray(item.data)) return item.data;
        if (item && typeof item.data === "object" && item.data !== null) {
          return [item.data];
        }
        return [item];
      });
      try {
        return flatten(wrap(payload));
      } catch {
        return [];
      }
    }

    function renderProduct(sku, product) {
      setSkeletonState(false);

      productVisualEl.innerHTML = "";

      resultSection.hidden = false;
      locationPanel.hidden = false;

      currentSku = sku;
      currentLocation = product.location || "";

      updateLocationText(currentLocation);
      editLocationBtn.hidden = false;
      quickEditBtn.hidden = false;
      cancelLocationEdit();

      if (product.imageUrl) {
        const img = document.createElement("img");
        img.src = product.imageUrl;
        img.alt = `Sản phẩm ${sku}`;
        img.onload = () => {
          productVisualEl.appendChild(img);
          animateReveal(img);
        };
        img.onerror = () => {
          productVisualEl.innerHTML = '<div class="placeholder">Ảnh lỗi</div>';
        };
      } else {
        productVisualEl.innerHTML = '<div class="placeholder">NO IMAGE</div>';
      }
    }

    function updateLocationText(loc) {
      if (!loc) {
        productLocationEl.textContent = "UNSET";
        productLocationEl.style.color = "#6E6E73";
      } else {
        productLocationEl.textContent = loc;
        productLocationEl.style.color = "#1D1D1F";
      }
    }

    function enterLocationEdit() {
      locationPanel.querySelector('.location-panel-header').hidden = true;
      locationEditor.hidden = false;
      quickEditBtn.hidden = true;
      locationInput.value = currentLocation;
      locationInput.focus();
    }

    function cancelLocationEdit() {
      locationEditor.hidden = true;
      locationPanel.querySelector('.location-panel-header').hidden = false;
      quickEditBtn.hidden = !currentSku;
      locationInput.value = "";
    }

    async function submitLocationUpdate() {
      const newLoc = locationInput.value.trim();
      if (newLoc === currentLocation) {
        cancelLocationEdit();
        return;
      }

      locationSaving = true;
      saveLocationBtn.textContent = "Đang lưu...";
      saveLocationBtn.disabled = true;
      cancelLocationBtn.disabled = true;

      try {
        const success = await sendLocationUpdate(currentSku, newLoc);
        if (success) {
          updateStatus("Cập nhật vị trí thành công!", "success");
          currentLocation = newLoc;
          updateLocationText(newLoc);
          cancelLocationEdit();
        } else {
          updateStatus("Cập nhật thất bại.", "error");
        }
      } catch (error) {
        updateStatus("Lỗi khi lưu: " + error.message, "error");
      } finally {
        locationSaving = false;
        saveLocationBtn.textContent = "Lưu";
        saveLocationBtn.disabled = false;
        cancelLocationBtn.disabled = false;
      }
    }

    async function sendLocationUpdate(sku, location) {
      const response = await fetch(UPDATE_LOCATION_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ sku, location }),
      });
      return response.ok;
    }

    function updateStatus(msg, type) {
      if (statusHideTimer) clearTimeout(statusHideTimer);
      if (!msg) {
        statusBar.hidden = true;
        return;
      }
      statusBar.textContent = msg;
      statusBar.dataset.variant = type;
      statusBar.hidden = false;

      if (type !== "loading") {
        statusHideTimer = setTimeout(() => {
          statusBar.hidden = true;
        }, STATUS_AUTO_HIDE);
      }
    }

    function setLoadingState(isLoading) {
      if (isLoading) {
        button.classList.add("loading");
        button.disabled = true;
      } else {
        button.classList.remove("loading");
        button.disabled = false;
      }
    }

    function clearCurrentProduct() {
      currentSku = "";
      currentLocation = "";
      productVisualEl.innerHTML = "";
      productLocationEl.textContent = "";
      quickEditBtn.hidden = true;
    }
  </script>
  <script>
    (() => {
      const topbar = document.querySelector('.topbar');
      const toggle = document.querySelector('.mobile-nav-toggle');
      const nav = document.querySelector('.header-nav');
      const backdrop = document.querySelector('.mobile-nav-backdrop');
      if (!topbar || !toggle || !nav || !backdrop) return;
      const closeMenu = () => {
        topbar.classList.remove('nav-open');
        document.body.classList.remove('mobile-nav-open');
        toggle.setAttribute('aria-expanded', 'false');
      };
      const openMenu = () => {
        topbar.classList.add('nav-open');
        document.body.classList.add('mobile-nav-open');
        toggle.setAttribute('aria-expanded', 'true');
      };
      toggle.addEventListener('click', () => {
        if (topbar.classList.contains('nav-open')) closeMenu();
        else openMenu();
      });
      backdrop.addEventListener('click', closeMenu);
      nav.addEventListener('click', (event) => {
        if (event.target.closest('a')) closeMenu();
      });
      window.addEventListener('resize', () => {
        if (window.innerWidth > 899) closeMenu();
      });
      document.addEventListener('keydown', (event) => {
        if (event.key === 'Escape') closeMenu();
      });
    })();
  </script>
</body>
