<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cô Mập Fashion - Vận Hành</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="stylesheet" href="app.css">
  <script>
    document.documentElement.classList.add('is-ready');
  </script>
  <style>
    /* Homepage Specific Styles */

    /* Mobile: Stacked, Desktop: Split (handled by app.css main grid) */

    .home-hero {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: flex-start;
      height: 100%;
      gap: 1rem;
    }

    .brand-large {
      font-size: 15vw;
      /* Massive on mobile */
      line-height: 0.9;
      font-weight: 800;
      letter-spacing: -0.04em;
      margin-bottom: 1rem;
      text-transform: uppercase;
    }

    .brand-subtitle {
      font-size: 1.2rem;
      font-weight: 400;
      color: #888;
      margin-bottom: 3rem;
      letter-spacing: 0.02em;
    }

    .home-menu {
      display: flex;
      flex-direction: column;
      gap: 0.9rem;
      align-items: stretch;
      justify-content: center;
      padding-left: 0;
      width: 100%;
      max-width: 32rem;
    }

    .menu-item {
      text-decoration: none;
      color: #000;
      font-size: clamp(1.05rem, 4vw, 1.35rem);
      font-weight: 600;
      position: relative;
      transition: transform 0.2s ease, border-color 0.2s ease, background-color 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: space-between;
      min-height: 64px;
      padding: 1rem 1.15rem;
      border-radius: 22px;
      border: 1px solid rgba(29, 29, 31, 0.08);
      background: rgba(255, 255, 255, 0.84);
      box-shadow: 0 18px 40px rgba(29, 29, 31, 0.06);
    }

    .menu-item::before {
      content: '>';
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 38px;
      height: 38px;
      border-radius: 999px;
      background: #1d1d1f;
      color: #fff;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .menu-item:hover {
      transform: translateY(-1px);
      border-color: rgba(29, 29, 31, 0.16);
      background: #fff;
    }

    .quick-resume {
      display: none;
      text-decoration: none;
      color: #000;
      border: 1px solid rgba(29, 29, 31, 0.08);
      border-radius: 24px;
      padding: 1rem 1.25rem;
      margin-bottom: 0.2rem;
      background: rgba(255, 255, 255, 0.86);
      box-shadow: 0 18px 40px rgba(29, 29, 31, 0.06);
    }

    .quick-resume.visible {
      display: block;
    }

    .quick-resume-label {
      display: block;
      font-size: 0.76rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: #888;
      margin-bottom: 0.35rem;
    }

    .quick-resume-title {
      display: block;
      font-size: 1.1rem;
      font-weight: 600;
    }

    /* Desktop Overrides */
    @media (min-width: 900px) {
      .brand-large {
        font-size: 5rem;
      }

      .home-hero {
        padding-right: 4rem;
        /* Line separator between hero and menu */
        border-right: 1px solid #f0f0f0;
      }

      .home-menu {
        padding-left: 4rem;
        gap: 1rem;
      }

      .menu-item {
        font-size: 1.25rem;
      }
    }

    @media (max-width: 899px) {
      .home-hero {
        padding-top: 0.25rem;
      }

      .brand-large {
        font-size: clamp(3.5rem, 15vw, 5.5rem);
        margin-bottom: 0;
      }

      .home-menu {
        margin-top: 1rem;
      }
    }

    /* Animation Optimization: Faster & No Delays */
    .fade-in-up {
      opacity: 0;
      animation: fadeInUp 0.22s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    /* Rapid "Machine Gun" Stagger */
    .delay-1 {
      animation-delay: 0.02s;
    }

    .delay-2 {
      animation-delay: 0.04s;
    }

    .delay-3 {
      animation-delay: 0.06s;
    }

    .delay-4 {
      animation-delay: 0.08s;
    }

    .delay-5 {
      animation-delay: 0.1s;
    }

    .delay-6 {
      animation-delay: 0.12s;
    }

    .page-enter {
      animation-duration: 0.25s;
    }

    .letter {
      animation-duration: 0.45s;
      animation-delay: calc(0.02s * var(--i));
    }

    .load-bar {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 2px;
      z-index: 999;
      background: transparent;
      pointer-events: none;
    }

    .load-bar span {
      display: block;
      height: 100%;
      width: 0;
      background: #000;
      animation: loadBar 0.45s ease-out forwards;
    }

    @keyframes loadBar {
      0% {
        width: 0;
        opacity: 0.6;
      }

      60% {
        width: 70%;
        opacity: 0.8;
      }

      100% {
        width: 100%;
        opacity: 0;
      }
    }
  </style>
</head>

<body class="home-page">
  <div class="load-bar" aria-hidden="true"><span></span></div>
  <main class="page-enter">
    <div class="topbar">
      <div class="sidebar-brand">
        <span class="sidebar-brand-mark">CM</span>
        <div class="sidebar-brand-text">
          <strong>Cô Mập</strong>
          <span>Fashion</span>
        </div>
        <span class="mobile-page-title">Trang chủ</span>
        <button class="mobile-nav-toggle" type="button" aria-label="Mở menu" aria-expanded="false">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 7h16"></path><path d="M4 12h16"></path><path d="M4 17h16"></path></svg>
        </button>
      </div>
      <nav class="header-nav" aria-label="Điều hướng">
        <a href="location.html" class="header-link">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 21s-5.5-4.2-5.5-9.25A5.5 5.5 0 0 1 12 6.25a5.5 5.5 0 0 1 5.5 5.5C17.5 16.8 12 21 12 21Z"></path><circle cx="12" cy="11.75" r="2.25"></circle></svg>
          <span class="nav-text">Vị trí</span>
        </a>
        <a href="thongtindonhang.html" class="header-link">
          <svg viewBox="0 0 24 24" aria-hidden="true"><rect x="4" y="5" width="16" height="14" rx="2"></rect><path d="M8 9h8"></path><path d="M8 13h5"></path></svg>
          <span class="nav-text">Đơn hàng</span>
        </a>
        <a href="bochang.html" class="header-link">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M5 8.5h10v10H5z"></path><path d="M15 11h2.5l1.5 2v5H15"></path><circle cx="8.5" cy="18.5" r="1.5"></circle><circle cx="16.5" cy="18.5" r="1.5"></circle></svg>
          <span class="nav-text">Đóng hàng</span>
        </a>
        <a href="hangbom.html" class="header-link">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M8 7h8"></path><path d="M9 7V5.5A1.5 1.5 0 0 1 10.5 4h3A1.5 1.5 0 0 1 15 5.5V7"></path><path d="M6 7h12l-1 12H7L6 7Z"></path></svg>
          <span class="nav-text">Hàng hoàn</span>
        </a>
        <a href="inmaqr.html" class="header-link">
          <svg viewBox="0 0 24 24" aria-hidden="true"><rect x="5" y="5" width="6" height="6"></rect><rect x="13" y="5" width="6" height="6"></rect><rect x="5" y="13" width="6" height="6"></rect><path d="M14 14h1"></path><path d="M18 14h1"></path><path d="M14 18h5"></path><path d="M18 15v3"></path></svg>
          <span class="nav-text">In Mã QR</span>
        </a>
        <a href="kiemkho.html" class="header-link">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M5 7h14"></path><path d="M7 7v10h10V7"></path><path d="M9.5 11.5h5"></path><path d="M9.5 14.5h3"></path></svg>
          <span class="nav-text">Kiểm Kho</span>
        </a>
      </nav>
      <div class="sidebar-meta">Cô Mập Fashion</div>
    </div>
    <button class="mobile-nav-backdrop" type="button" aria-label="Đóng menu"></button>

    <!-- Left Column: Brand Hero -->
    <section class="home-hero fade-in-up">
      <h1 class="brand-large" style="display: flex; flex-direction: column; width: 100%;">
        <span>CÔ MẬP</span>
        <span style="align-self: flex-end;">FASHION</span>
      </h1>

    </section>

    <!-- Right Column: Navigation Grid -->
    <nav class="home-menu">
      <a id="quick-resume-link" class="quick-resume" href="#">
        <span class="quick-resume-label">Tiếp tục công việc</span>
        <span id="quick-resume-title" class="quick-resume-title">Mở lại màn gần nhất</span>
      </a>
      <a href="location.html" class="menu-item fade-in-up delay-1">Vị trí</a>
      <a href="thongtindonhang.html" class="menu-item fade-in-up delay-2">Đơn hàng</a>
      <a href="bochang.html" class="menu-item fade-in-up delay-3">Đóng hàng</a>
      <a href="hangbom.html" class="menu-item fade-in-up delay-4">Hàng hoàn</a>
      <a href="inmaqr.html" class="menu-item fade-in-up delay-5">In Mã QR</a>
      <a href="kiemkho.html" class="menu-item fade-in-up delay-6">Kiểm Kho</a>
    </nav>

    <!-- Footer Hidden on Desktop via CSS -->
    <footer>&copy; <span id="year"></span> Kho vận hành.</footer>
  </main>

  <script>
    (() => {
      const topbar = document.querySelector('.topbar');
      const toggle = document.querySelector('.mobile-nav-toggle');
      const nav = document.querySelector('.header-nav');
      const backdrop = document.querySelector('.mobile-nav-backdrop');
      if (!topbar || !toggle || !nav || !backdrop) return;
      const closeMenu = () => {
        topbar.classList.remove('nav-open');
        document.body.classList.remove('mobile-nav-open');
        toggle.setAttribute('aria-expanded', 'false');
      };
      const openMenu = () => {
        topbar.classList.add('nav-open');
        document.body.classList.add('mobile-nav-open');
        toggle.setAttribute('aria-expanded', 'true');
      };
      toggle.addEventListener('click', () => {
        if (topbar.classList.contains('nav-open')) closeMenu();
        else openMenu();
      });
      backdrop.addEventListener('click', closeMenu);
      nav.addEventListener('click', (event) => {
        if (event.target.closest('a')) closeMenu();
      });
      window.addEventListener('resize', () => {
        if (window.innerWidth > 899) closeMenu();
      });
      document.addEventListener('keydown', (event) => {
        if (event.key === 'Escape') closeMenu();
      });
    })();

    document.getElementById('year').textContent = new Date().getFullYear();

    // Split Brand Text into Letters for Wave Animation
    const brandSpans = document.querySelectorAll('.brand-large > span');
    brandSpans.forEach(span => {
      const text = span.textContent.trim();
      span.innerHTML = text.split('').map((char, index) =>
        char === ' ' ? '&nbsp;' : `<span class="letter" style="--i:${index}">${char}</span>`
      ).join('');
    });

    const loadBar = document.querySelector('.load-bar');
    if (loadBar) {
      setTimeout(() => loadBar.remove(), 650);
    }

    const LAST_PAGE_KEY = 'cmf:lastPage';
    const pageTitles = {
      'location.html': 'Vị trí',
      'thongtindonhang.html': 'Đơn hàng',
      'bochang.html': 'Đóng hàng',
      'hangbom.html': 'Hàng hoàn',
      'inmaqr.html': 'In Mã QR',
      'kiemkho.html': 'Kiểm Kho',
    };

    document.querySelectorAll('a[href$=".html"]').forEach((link) => {
      link.addEventListener('click', () => {
        const href = link.getAttribute('href');
        if (pageTitles[href]) localStorage.setItem(LAST_PAGE_KEY, href);
      });
    });

    const quickResumeLink = document.getElementById('quick-resume-link');
    const quickResumeTitle = document.getElementById('quick-resume-title');
    const lastPage = localStorage.getItem(LAST_PAGE_KEY);
    if (quickResumeLink && quickResumeTitle && lastPage && pageTitles[lastPage]) {
      quickResumeLink.href = lastPage;
      quickResumeTitle.textContent = pageTitles[lastPage];
      quickResumeLink.classList.add('visible');
    }

    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function () {
        navigator.serviceWorker.register('sw.js').catch(console.error);
      });
    }
  </script>
</body>

</html>
