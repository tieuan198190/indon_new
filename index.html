<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cô Mập Fashion - Vận Hành</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="stylesheet" href="app.css">
  <script>
    document.documentElement.classList.add('is-ready');
  </script>
  <style>
    /* Homepage Specific Styles */

    /* Mobile: Stacked, Desktop: Split (handled by app.css main grid) */

    .home-hero {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: flex-start;
      height: 100%;
    }

    .brand-large {
      font-size: 15vw;
      /* Massive on mobile */
      line-height: 0.9;
      font-weight: 800;
      letter-spacing: -0.04em;
      margin-bottom: 1rem;
      text-transform: uppercase;
    }

    .brand-subtitle {
      font-size: 1.2rem;
      font-weight: 400;
      color: #888;
      margin-bottom: 3rem;
      letter-spacing: 0.02em;
    }

    .home-menu {
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
      align-items: flex-start;
      justify-content: center;
      padding-left: 2rem;
    }

    .menu-item {
      text-decoration: none;
      color: #000;
      font-size: 2rem;
      font-weight: 400;
      position: relative;
      transition: opacity 0.3s ease;
      display: flex;
      align-items: center;
    }

    .menu-item::before {
      content: '';
      width: 6px;
      height: 6px;
      background: #000;
      border-radius: 50%;
      position: absolute;
      left: -20px;
      opacity: 0;
      transform: scale(0);
      transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .menu-item:hover {
      opacity: 0.7;
    }

    .menu-item:hover::before {
      opacity: 1;
      transform: scale(1);
      left: -15px;
    }

    /* Desktop Overrides */
    @media (min-width: 900px) {
      .brand-large {
        font-size: 5rem;
      }

      .home-hero {
        padding-right: 4rem;
        /* Line separator between hero and menu */
        border-right: 1px solid #f0f0f0;
      }

      .home-menu {
        padding-left: 4rem;
        gap: 2rem;
      }

      .menu-item {
        font-size: 2.5rem;
      }
    }

    /* Animation Optimization: Faster & No Delays */
    .fade-in-up {
      opacity: 0;
      animation: fadeInUp 0.22s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    /* Rapid "Machine Gun" Stagger */
    .delay-1 {
      animation-delay: 0.02s;
    }

    .delay-2 {
      animation-delay: 0.04s;
    }

    .delay-3 {
      animation-delay: 0.06s;
    }

    .delay-4 {
      animation-delay: 0.08s;
    }

    .page-enter {
      animation-duration: 0.25s;
    }

    .letter {
      animation-duration: 0.45s;
      animation-delay: calc(0.02s * var(--i));
    }

    .load-bar {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 2px;
      z-index: 999;
      background: transparent;
      pointer-events: none;
    }

    .load-bar span {
      display: block;
      height: 100%;
      width: 0;
      background: #000;
      animation: loadBar 0.45s ease-out forwards;
    }

    @keyframes loadBar {
      0% {
        width: 0;
        opacity: 0.6;
      }

      60% {
        width: 70%;
        opacity: 0.8;
      }

      100% {
        width: 100%;
        opacity: 0;
      }
    }
  </style>
</head>

<body>
  <div class="load-bar" aria-hidden="true"><span></span></div>
  <main class="page-enter">
    <!-- Left Column: Brand Hero -->
    <section class="home-hero fade-in-up">
      <h1 class="brand-large" style="display: flex; flex-direction: column; width: 100%;">
        <span>CÔ MẬP</span>
        <span style="align-self: flex-end;">FASHION</span>
      </h1>

    </section>

    <!-- Right Column: Navigation Grid -->
    <nav class="home-menu">
      <a href="location.html" class="menu-item fade-in-up delay-1">Vị trí</a>
      <a href="thongtindonhang.html" class="menu-item fade-in-up delay-2">Đơn hàng</a>
      <a href="bochang.html" class="menu-item fade-in-up delay-3">Đóng hàng</a>
      <a href="hangbom.html" class="menu-item fade-in-up delay-4">Hàng hoàn</a>
    </nav>

    <!-- Footer Hidden on Desktop via CSS -->
    <footer>&copy; <span id="year"></span> Kho vận hành.</footer>
  </main>

  <script>
    document.getElementById('year').textContent = new Date().getFullYear();

    // Split Brand Text into Letters for Wave Animation
    const brandSpans = document.querySelectorAll('.brand-large > span');
    brandSpans.forEach(span => {
      const text = span.textContent.trim();
      span.innerHTML = text.split('').map((char, index) =>
        char === ' ' ? '&nbsp;' : `<span class="letter" style="--i:${index}">${char}</span>`
      ).join('');
    });

    const loadBar = document.querySelector('.load-bar');
    if (loadBar) {
      setTimeout(() => loadBar.remove(), 650);
    }

    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function () {
        navigator.serviceWorker.register('sw.js').catch(console.error);
      });
    }
  </script>
</body>

</html>
