<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Đơn Hàng - Cô Mập Fashion</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="app.css">
  <style>
    body.order-page {
      --sidebar-width: 14%;
      --search-form-width: min(100%, 640px);
      --search-form-offset: 2.4rem;
      --shell-pad-x: clamp(3rem, 5vw, 4rem);
      --shell-pad-y: clamp(2.25rem, 3vw, 3rem);
      background: #F5F5F7;
      color: #1D1D1F;
    }

    .order-page main {
      max-width: 1320px;
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    .order-page .lookup-form {
      position: relative;
      width: var(--search-form-width);
      margin-left: 0;
      margin-right: 0;
      margin-top: var(--search-form-offset);
      margin-bottom: 0;
      justify-self: start;
      align-self: start;
    }

    .order-page #lookup-form {
      width: 100%;
      display: grid;
      grid-template-columns: auto minmax(0, 1fr);
      align-items: center;
      gap: 1rem;
      padding: 0 0 0.75rem;
      border-bottom: 1px solid #D2D2D7;
    }

    .order-page #lookup-form:focus-within {
      border-bottom-color: #1D1D1F;
    }

    .order-page #order-input {
      border: none;
      padding: 0;
      background: transparent;
      font-family: "Inter", sans-serif;
      font-size: clamp(1.15rem, 1.8vw, 1.55rem);
      font-weight: 400;
      line-height: 1.2;
      text-align: left;
      color: #1D1D1F;
      width: 100%;
    }

    .order-page #order-input::placeholder {
      font-family: "Inter", sans-serif;
      font-size: inherit;
      line-height: inherit;
      color: #6E6E73;
      font-weight: 400;
    }

    .order-page #order-input:focus {
      border-bottom: none;
    }

    .order-page #lookup-btn {
      width: 2.25rem;
      height: 2.25rem;
      min-width: 0;
      padding: 0;
      border: none;
      border-radius: 999px;
      background: transparent;
      color: #1D1D1F;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      box-shadow: none;
      transform: none;
      margin: 0;
    }

    .order-page #lookup-btn:hover,
    .order-page #lookup-btn:active {
      background: transparent;
      color: #1D1D1F;
      transform: none;
    }

    .order-page #lookup-btn svg {
      width: 1.35rem;
      height: 1.35rem;
      stroke: currentColor;
      stroke-width: 2;
      fill: none;
    }

    .order-page .mobile-inline-submit {
      display: none;
    }

    .order-page .mobile-camera-submit,
    .order-page .mobile-camera-panel {
      display: none;
    }

    .order-page .mobile-camera-panel {
      margin-top: 0.9rem;
      padding: 0.9rem;
      border: 1px solid #D2D2D7;
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.92);
    }

    .order-page .camera-reader {
      width: 100%;
      min-height: 240px;
      border-radius: 16px;
      overflow: hidden;
      background: #FAFAFB;
      border: 1px dashed rgba(29, 29, 31, 0.14);
    }

    .order-page .camera-hint {
      margin: 0.75rem 0 0;
      color: #6E6E73;
      font-size: 0.88rem;
    }

    @media (max-width: 899px) {
      .order-page {
        --mobile-order-action-size: 54px;
      }

      .order-page .lookup-form {
        margin-top: 0.8rem;
      }

      .order-page #lookup-form {
        grid-template-columns: minmax(0, 1fr) var(--mobile-order-action-size) var(--mobile-order-action-size);
        gap: 0.75rem;
        align-items: end;
      }

      .order-page #lookup-btn {
        display: none;
      }

      .order-page .mobile-inline-submit,
      .order-page .mobile-camera-submit {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 100% !important;
        min-width: 0;
        max-width: none;
        height: 42px;
        min-height: 42px;
        padding: 0 !important;
        margin: 0;
        border: 1px solid #1D1D1F;
        border-radius: 999px;
        background: #1D1D1F;
        color: #FFFFFF;
        box-sizing: border-box;
        appearance: none;
        -webkit-appearance: none;
        transform: none !important;
      }

      .order-page .mobile-inline-submit {
        font-size: 0.85rem;
        font-weight: 600;
        line-height: 1;
      }

      .order-page .mobile-camera-submit svg {
        width: 18px;
        height: 18px;
        stroke: currentColor;
        stroke-width: 2;
        fill: none;
      }

      .order-page .mobile-inline-submit:hover,
      .order-page .mobile-inline-submit:active,
      .order-page .mobile-camera-submit:hover,
      .order-page .mobile-camera-submit:active {
        transform: none;
      }

      .order-page .mobile-camera-panel.is-open {
        display: block;
      }

      .order-page #lookup-form.camera-active {
        grid-template-columns: 1fr auto;
      }

      .order-page #lookup-form.camera-active #order-input,
      .order-page #lookup-form.camera-active .mobile-inline-submit {
        display: none;
      }

      .order-page #order-input {
        min-height: 42px;
      }
    }

    .order-page .result-card {
      display: grid;
      grid-template-columns: 1fr;
      gap: 1.15rem;
      width: min(100%, 1100px);
      margin: 0.9rem auto 0;
      align-items: start;
    }

    .order-page .location-panel {
      padding-top: 0.1rem;
      text-align: left;
      width: 100%;
      min-width: 0;
    }

    .order-page .location-panel-header {
      align-items: flex-start;
      gap: 0.4rem;
      margin-bottom: 0;
    }

    .order-page .location-label {
      margin: 0;
      font-size: 0.78rem;
      line-height: 1.2;
      letter-spacing: 0.08em;
    }

    .order-page .location-text {
      font-size: clamp(2.8rem, 4.7vw, 4.8rem);
      line-height: 0.94;
      margin: 0;
    }

    .order-page .order-meta {
      margin-top: 0.2rem;
      font-size: 1rem;
      color: #6E6E73;
    }

    .order-page .items-wrap {
      width: 100%;
      position: relative;
    }

    .order-page #items-panel {
      width: 100%;
    }

    .order-page #items-panel>.location-label {
      margin-bottom: 1rem;
    }

    .order-page .items-surface {
      background: #FFFFFF;
      border: 1px solid #D2D2D7;
      border-radius: 20px;
      padding: 0.8rem 1.15rem;
      min-height: 0;
      overflow: hidden;
      aspect-ratio: auto;
    }

    /* Table Minimalist overrides */
    .clean-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.94rem;
    }

    .clean-table th {
      text-align: left;
      font-weight: 500;
      color: #6E6E73;
      padding: 0.65rem 0;
      border-bottom: 1px solid #D2D2D7;
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .clean-table td {
      padding: 1rem 0;
      border-bottom: 1px solid #ECECEF;
      vertical-align: top;
    }

    .clean-table tbody tr {
      min-height: 168px;
    }

    .clean-table tr:last-child td {
      border-bottom: none;
    }

    .item-cell {
      display: flex;
      align-items: flex-start;
      gap: 1rem;
      min-height: 0;
    }

    .item-copy {
      min-width: 0;
    }

    .item-code {

      color: #1D1D1F;
      line-height: 1.2;
      font-size: 1.1rem;
    }

    .item-sub {
      color: #6E6E73;
      font-size: 0.88rem;
      margin-top: 0.22rem;
    }

    .order-page .item-thumb {
      width: 108px;
      height: 144px;
      min-width: 108px;
      min-height: 144px;
      max-width: 108px;
      max-height: 144px;
      border-radius: 14px;
      object-fit: cover;
      object-position: center top;
      display: block;
      background: #FFFFFF;
      border: 1px solid #D2D2D7;
      flex-shrink: 0;
    }

    .order-page .item-thumb-placeholder {
      width: 108px;
      height: 144px;
      min-width: 108px;
      min-height: 144px;
      border-radius: 14px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: #FFFFFF;
      border: 1px solid #D2D2D7;
      color: #6E6E73;
      font-size: 0.66rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      flex-shrink: 0;
    }

    .clean-table th.location-col {
      width: 34%;
      text-align: left;
    }

    .item-location {
      text-align: left;
      font-weight: 600;
      color: #1D1D1F;
      white-space: normal;
      width: 34%;
      max-width: 240px;
      min-width: 160px;
      line-height: 1.3;
      font-size: 1rem;
      padding-left: 0.75rem;
    }

    @media (min-width: 900px) {
      .order-page main {
        width: calc(100% - var(--sidebar-width));
        max-width: none;
        align-items: start;
      }

      .order-page .lookup-form {
        grid-column: 1 / 2;
        width: 100%;
        max-width: none;
        margin-left: 0;
        margin-right: 0;
        margin-top: 0;

      .order-page .result-card {
        grid-column: 1 / -1;
        width: 100%;
        max-width: none;
        grid-template-columns: 1fr 1fr;
        gap: clamp(2rem, 4vw, 4rem);
        margin-top: 0.9rem;
        align-items: start;
      }

      .order-page .location-panel {
        display: flex;
        align-items: flex-start;
        justify-content: flex-start;
        min-width: 0;
        padding-top: 0.2rem;
      }

      .order-page .location-panel-header {
        width: min(100%, 520px);
        gap: 0.75rem;
      }

      .order-page .location-text {
        font-size: clamp(4.3rem, 5.8vw, 6rem);
        line-height: 0.9;
      }

      .order-page .order-meta {
        font-size: 1.05rem;
      }

      .order-page .items-wrap {
        min-width: 0;
        display: flex;
        justify-content: flex-end;
        padding-top: 0.2rem;
      }

      .order-page #items-panel {
        width: min(100%, 540px);
      }

      .order-page .items-surface {
        border-radius: 24px;
        padding: 0.95rem 1.25rem;
      }

      .order-page .clean-table th {
        padding-top: 0.8rem;
        padding-bottom: 0.8rem;
      }
    }

    .order-page .item-thumb,
    .order-page .items-surface .item-thumb {
      width: 108px !important;
      height: 144px !important;
    }

    .note-box {
      background: #fffbeb;
      border: 1px solid #fcd34d;
      color: #92400e;
      padding: 0.7rem 0.85rem;
      border-radius: var(--radius-sm);
      margin-top: 0.6rem;
      font-size: 0.85rem;
    }

    @media (max-width: 899px) {
      .order-page .result-card {
        gap: 1rem;
      }

      .order-page .location-panel {
        padding: 0;
        border: none;
        border-radius: 0;
        background: transparent;
        box-shadow: none;
      }

      .order-page .location-text {
        font-size: clamp(2.4rem, 12vw, 3.6rem);
      }

      .clean-table th.location-col,
      .item-location {
        width: auto;
        min-width: 0;
      }

      .order-page .item-thumb,
      .order-page .items-surface .item-thumb,
      .order-page .item-thumb-placeholder {
        width: 84px !important;
        height: 112px !important;
        min-width: 84px;
        min-height: 112px;
      }

      .item-cell {
        min-height: 118px;
      }
    }

    .order-page footer {
      display: none;
    }
  </style>
</head>

  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
  <script>
    const API_URL = "https://n8n-hongnhung198198-u40833.vm.elestio.app/webhook/thongtin_don";
    const LAST_PAGE_KEY = 'cmf:lastPage';

    const lookupForm = document.getElementById('lookup-form');
    const orderInput = document.getElementById('order-input');
    const openCameraBtn = document.getElementById('openCameraBtn');
    const cameraPanel = document.getElementById('cameraPanel');
    const statusBar = document.getElementById('status-bar');
    const resultCard = document.getElementById('result-card');

    const displayCode = document.getElementById('display-order-code');
    const displayCustomer = document.getElementById('display-customer');
    const displayNote = document.getElementById('display-note');

    orderInput.focus();
    const noteContainer = document.getElementById('note-container');
    const itemsTableBody = document.getElementById('items-table-body');
    const itemsPanel = document.getElementById('items-panel');
    localStorage.setItem(LAST_PAGE_KEY, 'thongtindonhang.html');
    let qrScanner = null;
    let lastScannedCode = null;
    let lastScannedAt = 0;
    let permissionGranted = false;
    const DEDUPE_MS = 1200;

    const isIosSafari = (() => {
      const ua = navigator.userAgent;
      const iOS = /iPad|iPhone|iPod/.test(ua) || (ua.includes('Mac') && 'ontouchend' in document);
      const safari = /^((?!chrome|android).)*safari/i.test(ua);
      return iOS && safari;
    })();

    document.getElementById('year').textContent = new Date().getFullYear();

    function updateStatus(msg, type = 'idle') {
      if (!msg) { statusBar.hidden = true; return; }
      statusBar.textContent = msg;
      statusBar.dataset.variant = type;
      statusBar.hidden = false;
      if (type !== 'loading') setTimeout(() => statusBar.hidden = true, 3000);
    }

    function ensureSecureCameraContext() {
      const isLocalhost = location.hostname === 'localhost' || location.hostname === '127.0.0.1';
      if (location.protocol === 'https:' || isLocalhost) return true;
      updateStatus('Camera chỉ hoạt động trên HTTPS hoặc localhost', 'error');
      return false;
    }

    async function requestCameraPermission() {
      if (!navigator.mediaDevices?.getUserMedia) {
        throw new Error('Trình duyệt không hỗ trợ camera.');
      }
      if (!isIosSafari || permissionGranted) return;
      let stream = null;
      try {
        stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: { exact: 'environment' }, width: { ideal: 1280 }, height: { ideal: 720 } },
          audio: false
        });
      } catch {
        stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: { ideal: 'environment' }, width: { ideal: 1280 }, height: { ideal: 720 } },
          audio: false
        });
      }
      stream.getTracks().forEach((track) => track.stop());
      permissionGranted = true;
    }

    async function closeCamera() {
      cameraPanel.hidden = true;
      cameraPanel.classList.remove('is-open');
      lookupForm.classList.remove('camera-active');
      if (openCameraBtn) openCameraBtn.setAttribute('aria-label', 'Bật camera');
      if (!qrScanner) return;
      try {
        await qrScanner.stop();
        await qrScanner.clear();
      } catch {
      } finally {
        qrScanner = null;
      }
    }

    async function openCamera() {
      if (window.innerWidth > 899) return;
      if (typeof Html5Qrcode === 'undefined') {
        updateStatus('Camera chưa sẵn sàng', 'error');
        return;
      }
      if (!ensureSecureCameraContext()) return;
      cameraPanel.hidden = false;
      cameraPanel.classList.add('is-open');
      lookupForm.classList.add('camera-active');
      if (openCameraBtn) openCameraBtn.setAttribute('aria-label', 'Đóng camera');
      if (qrScanner) return;
      qrScanner = new Html5Qrcode('reader');
      try {
        await requestCameraPermission();
        const onScanSuccess = async (decodedText) => {
          const now = Date.now();
          if (decodedText === lastScannedCode && now - lastScannedAt < DEDUPE_MS) return;
          lastScannedCode = decodedText;
          lastScannedAt = now;
          await closeCamera();
          fetchOrder(decodedText);
        };
        const baseConfig = {
          fps: 10,
          qrbox: { width: 220, height: 220 },
          disableFlip: true,
          experimentalFeatures: { useBarCodeDetectorIfSupported: true },
          videoConstraints: {
            facingMode: { ideal: 'environment' },
            width: { ideal: 1280 },
            height: { ideal: 720 }
          }
        };
        try {
          await qrScanner.start({ facingMode: 'environment' }, baseConfig, onScanSuccess);
        } catch {
          const cameras = await Html5Qrcode.getCameras();
          const backCamera = cameras.find((cam) => /back|rear|environment/gi.test(cam.label || ''));
          const selectedCamera = backCamera?.id || cameras[0]?.id;
          if (!selectedCamera) throw new Error('Không tìm thấy camera');
          await qrScanner.start(selectedCamera, baseConfig, onScanSuccess);
        }
        updateStatus('Camera đã bật', 'loading');
      } catch (error) {
        updateStatus(error?.message || 'Không mở được camera', 'error');
        await closeCamera();
      }
    }

    async function fetchOrder(code) {
      updateStatus('Đang tra cứu...', 'loading');
      try {
        const res = await fetch(API_URL, {
          method: 'POST',
          body: JSON.stringify({ message: code, text: code, orderCode: code }),
          headers: { 'Content-Type': 'application/json' }
        });
        const data = await res.json();
        const order = normalizeOrderPayload(data);

        if (!order || !order.orderId) throw new Error('Không tìm thấy đơn hàng');

        renderOrder(order);
        updateStatus('', 'idle');
      } catch (e) {
        updateStatus(e.message, 'error');
      }
    }

    function normalizeOrderPayload(payload) {
      const list = Array.isArray(payload) ? payload : [payload];
      const order = list.find((item) => item && typeof item === 'object') || null;
      if (!order) return null;

      return {
        orderId: order.orderId || '',
        description: order.description || '',
        privateDescription: order.privateDescription || '',
        products: Array.isArray(order.products) ? order.products : []
      };
    }

    function renderOrder(data) {
      resultCard.hidden = false;
      itemsPanel.hidden = false;

      displayCode.textContent = data.orderId || '---';
      displayCustomer.textContent = data.description || `${data.products.length} sản phẩm`;

      if (data.privateDescription) {
        displayNote.textContent = data.privateDescription;
        noteContainer.hidden = false;
      } else {
        noteContainer.hidden = true;
      }

      itemsTableBody.innerHTML = '';
      const lines = data.products || [];
      lines.forEach(line => {
        const row = document.createElement('tr');
        const imageMarkup = line.productImage
          ? `<img class="item-thumb" src="${line.productImage}" alt="${line.productCode || 'Sản phẩm'}">`
          : `<span class="item-thumb-placeholder">No image</span>`;
        row.innerHTML = `
                 <td>
                    <div class="item-cell">
                      ${imageMarkup}
                      <div class="item-copy">
                        <div class="item-code">${line.productCode || '---'}</div>
                      </div>
                    </div>
                 </td>
                 <td class="item-location">${line.locate || '-'}</td>
             `;
        itemsTableBody.appendChild(row);
      });

      if (!lines.length) {
        const row = document.createElement('tr');
        row.innerHTML = `
          <td>
            <div style="font-weight: 500;">Không có sản phẩm</div>
            <div style="color: #6E6E73; font-size: 0.8rem;">Webhook không trả về danh sách sản phẩm</div>
          </td>
          <td style="text-align: right; font-weight: 600;">-</td>
        `;
        itemsTableBody.appendChild(row);
      }
    }

    lookupForm.addEventListener('submit', (e) => {
      e.preventDefault();
      const code = orderInput.value.trim();
      if (code) {
        orderInput.value = '';
        fetchOrder(code);
      }
    });

    openCameraBtn?.addEventListener('click', () => {
      if (lookupForm.classList.contains('camera-active')) {
        closeCamera();
      } else {
        openCamera();
      }
    });

    window.addEventListener('pagehide', () => {
      closeCamera();
    });

  </script>
  <script>
    (() => {
      const topbar = document.querySelector('.topbar');
      const toggle = document.querySelector('.mobile-nav-toggle');
      const nav = document.querySelector('.header-nav');
      const backdrop = document.querySelector('.mobile-nav-backdrop');
      if (!topbar || !toggle || !nav || !backdrop) return;
      const closeMenu = () => {
        topbar.classList.remove('nav-open');
        document.body.classList.remove('mobile-nav-open');
        toggle.setAttribute('aria-expanded', 'false');
      };
      const openMenu = () => {
        topbar.classList.add('nav-open');
        document.body.classList.add('mobile-nav-open');
        toggle.setAttribute('aria-expanded', 'true');
      };
      toggle.addEventListener('click', () => {
        if (topbar.classList.contains('nav-open')) closeMenu();
        else openMenu();
      });
      backdrop.addEventListener('click', closeMenu);
      nav.addEventListener('click', (event) => {
        if (event.target.closest('a')) closeMenu();
      });
      window.addEventListener('resize', () => {
        if (window.innerWidth > 899) closeMenu();
      });
      document.addEventListener('keydown', (event) => {
        if (event.key === 'Escape') closeMenu();
      });
    })();
  </script>
</body>

</html>
