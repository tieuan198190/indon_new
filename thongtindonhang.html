<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Đơn Hàng - Cô Mập Fashion</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="app.css">
  <style>
    /* Table Minimalist overrides */
    .clean-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.9rem;
    }

    .clean-table th {
      text-align: left;
      font-weight: 500;
      color: #888;
      padding: 0.75rem 0;
      border-bottom: 1px solid #eee;
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .clean-table td {
      padding: 1rem 0;
      border-bottom: 1px solid #f9f9f9;
    }

    .clean-table tr:last-child td {
      border-bottom: none;
    }

    /* Camera container integration */
    #camera-container {
      position: relative;
      background: #000;
      border-radius: var(--radius-sm);
      overflow: hidden;
      width: 100%;
      height: 100%;
      min-height: 300px;
    }

    video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .camera-overlay {
      position: absolute;
      inset: 0;
      border: 2px solid rgba(255, 255, 255, 0.3);
      margin: 2rem;
      border-radius: 12px;
      pointer-events: none;
    }

    .note-box {
      background: #fffbeb;
      border: 1px solid #fcd34d;
      color: #92400e;
      padding: 1rem;
      border-radius: var(--radius-sm);
      margin-top: 1rem;
      font-size: 0.9rem;
    }
  </style>
</head>

<body>
  <main>
    <div class="topbar">
      <nav class="header-nav">
        <a href="index.html" class="header-link">Home</a>
        <a href="location.html" class="header-link">Vị trí</a>
        <a href="thongtindonhang.html" class="header-link active">Đơn hàng</a>
        <a href="bochang.html" class="header-link">Đóng hàng</a>
        <a href="hangbom.html" class="header-link">Hàng hoàn</a>
      </nav>
    </div>

    <!-- Search -->
    <div class="lookup-form">
      <form id="lookup-form" autocomplete="off">
        <label class="sr-only" for="order-input">Mã đơn hàng</label>
        <div class="input-group" style="width: 100%; border:none;">
          <input id="order-input" type="text" placeholder="Nhập mã đơn hoặc quét..." autocomplete="off" />
          <!-- Optional Camera Toggle Button -->
          <button type="button" id="camera-btn" style="width: auto; background: none; color: #000; padding: 0.5rem;">
            <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z" />
              <circle cx="12" cy="13" r="4" />
            </svg>
          </button>
        </div>
        <button type="submit" id="lookup-btn">Tra cứu</button>
      </form>
    </div>

    <div class="status-bar" id="status-bar" hidden></div>

    <section id="result-card" class="result-card" hidden>
      <!-- Left: Info -->
      <article class="location-panel">
        <div class="location-panel-header">
          <p class="location-label">Thông tin đơn hàng</p>
          <div id="order-info-content">
            <p class="location-text" id="display-order-code">---</p>
            <p style="margin-top: 0.5rem; font-size: 1.1rem;" id="display-customer">---</p>

            <div id="note-container" class="note-box" hidden>
              <strong>Ghi chú:</strong> <span id="display-note"></span>
            </div>

            <div style="margin-top: 2rem;">
              <p class="location-label">Trạng thái</p>
              <div id="display-status" style="font-size: 1.2rem; font-weight: 500;">---</div>
            </div>
          </div>
        </div>
      </article>

      <!-- Right: Items or Camera -->
      <article style="width: 100%; position: relative;">
        <!-- Camera View (Toggled) -->
        <div id="camera-panel" hidden
          style="background: black; border-radius: 8px; overflow: hidden; height: 400px; position:relative;">
          <video id="video-preview" muted playsinline></video>
          <div class="camera-overlay"></div>
          <button type="button" id="close-camera" class="ghost-btn"
            style="position: absolute; bottom: 1rem; left: 50%; transform: translateX(-50%); background: white; color: black; border: none; margin: 0;">Đóng
            Camera</button>
        </div>

        <!-- Items List -->
        <div id="items-panel">
          <div class="location-label">Chi tiết sản phẩm</div>
          <div class="product-visual"
            style="height: auto; min-height: 200px; background: white; border: 1px solid #f2f2f2; border-radius: 8px; padding: 1rem; aspect-ratio: auto;">
            <table class="clean-table">
              <thead>
                <tr>
                  <th>Sản phẩm</th>
                  <th style="text-align: right;">SL</th>
                </tr>
              </thead>
              <tbody id="items-table-body">
                <!-- Rows -->
              </tbody>
            </table>
          </div>
        </div>
      </article>
    </section>

    <footer>&copy; <span id="year"></span> Kho vận hành.</footer>
  </main>

  <script>
    const API_URL = "https://n8n-hongnhung198198-u40833.vm.elestio.app/webhook/thongtindonhang";

    const lookupForm = document.getElementById('lookup-form');
    const orderInput = document.getElementById('order-input');
    const statusBar = document.getElementById('status-bar');
    const resultCard = document.getElementById('result-card');

    const displayCode = document.getElementById('display-order-code');
    const displayCustomer = document.getElementById('display-customer');
    const displayNote = document.getElementById('display-note');
    const noteContainer = document.getElementById('note-container');
    const displayStatus = document.getElementById('display-status');
    const itemsTableBody = document.getElementById('items-table-body');

    const cameraBtn = document.getElementById('camera-btn');
    const cameraPanel = document.getElementById('camera-panel');
    const itemsPanel = document.getElementById('items-panel');
    const videoPreview = document.getElementById('video-preview');
    const closeCameraBtn = document.getElementById('close-camera');

    let stream = null;
    let barcodeDetector = null;

    document.getElementById('year').textContent = new Date().getFullYear();

    function updateStatus(msg, type = 'idle') {
      if (!msg) { statusBar.hidden = true; return; }
      statusBar.textContent = msg;
      statusBar.dataset.variant = type;
      statusBar.hidden = false;
      if (type !== 'loading') setTimeout(() => statusBar.hidden = true, 3000);
    }

    async function fetchOrder(code) {
      updateStatus('Đang tra cứu...', 'loading');
      try {
        const res = await fetch(API_URL, {
          method: 'POST',
          body: JSON.stringify({ message: code, text: code }), // Supporting legacy payloads
          headers: { 'Content-Type': 'application/json' }
        });
        const data = await res.json();
        const order = Array.isArray(data) ? data[0] : data;

        if (!order || (!order.order_code && !order.ma_don_hang)) throw new Error('Không tìm thấy đơn hàng');

        renderOrder(order);
        updateStatus('', 'idle');
      } catch (e) {
        updateStatus(e.message, 'error');
      }
    }

    function renderOrder(data) {
      resultCard.hidden = false;
      itemsPanel.hidden = false;
      cameraPanel.hidden = true;
      stopCamera();

      displayCode.textContent = data.order_code || data.ma_don_hang || '---';
      displayCustomer.textContent = data.customer_name || data.ten_khach_hang || '';

      const note = data.note || data.ghi_chu;
      if (note) {
        displayNote.textContent = note;
        noteContainer.hidden = false;
      } else {
        noteContainer.hidden = true;
      }

      displayStatus.textContent = data.status || data.trang_thai || 'Đã đồng bộ';

      // Items
      itemsTableBody.innerHTML = '';
      const lines = data.line_items || data.san_pham || [];
      lines.forEach(line => {
        const row = document.createElement('tr');
        row.innerHTML = `
                 <td>
                    <div style="font-weight: 500;">${line.sku || line.ma_san_pham}</div>
                    <div style="color: #888; font-size: 0.8rem;">${line.name || line.ten_san_pham || ''}</div>
                 </td>
                 <td style="text-align: right; font-weight: 600;">${line.quantity || line.so_luong}</td>
             `;
        itemsTableBody.appendChild(row);
      });
    }

    // Camera Handling
    async function startCamera() {
      if (!('BarcodeDetector' in window)) {
        alert('Trình duyệt không hỗ trợ quét mã vạch.');
        return;
      }
      try {
        stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
        videoPreview.srcObject = stream;
        await videoPreview.play();

        cameraPanel.hidden = false;
        itemsPanel.hidden = true;
        resultCard.hidden = false; // Show result card container to show camera

        barcodeDetector = new BarcodeDetector({ formats: ['qr_code', 'code_128', 'code_39'] });
        detectLoop();
      } catch (e) {
        alert('Không thể mở camera: ' + e.message);
      }
    }

    function stopCamera() {
      if (stream) {
        stream.getTracks().forEach(t => t.stop());
        stream = null;
      }
      cameraPanel.hidden = true;
      itemsPanel.hidden = false;
    }

    async function detectLoop() {
      if (!stream) return;
      try {
        const barcodes = await barcodeDetector.detect(videoPreview);
        if (barcodes.length > 0) {
          const code = barcodes[0].rawValue;
          playSound();
          orderInput.value = code;
          stopCamera();
          fetchOrder(code);
          return;
        }
      } catch (e) { }
      requestAnimationFrame(detectLoop);
    }

    function playSound() {
      // Simple beep could go here
    }

    lookupForm.addEventListener('submit', (e) => {
      e.preventDefault();
      const code = orderInput.value.trim();
      if (code) fetchOrder(code);
    });

    cameraBtn.addEventListener('click', () => {
      if (stream) stopCamera();
      else startCamera();
    });

    closeCameraBtn.addEventListener('click', stopCamera);

  </script>
</body>

</html>
